services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scholarflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: learning_resources
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - scholarflow_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learning_resources"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scholarflow_postgres_data:
